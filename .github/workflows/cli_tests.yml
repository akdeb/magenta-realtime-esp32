name: Collider App Build

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-examples:
    name: Build Collider App
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Install and Build Collider UI
      run: |
        cd examples
        npm install
        npm run build --workspaces --if-present

    - name: Install native build dependencies
      run: brew install cmake pkg-config opus

    - name: Configure CMake
      run: cmake . -B build -DCMAKE_POLICY_VERSION_MINIMUM=3.5

    - name: Build Collider App
      run: |
        cmake --build build --target \
          magentart_core \
          mrt2_collider \
          -j$(sysctl -n hw.ncpu)
